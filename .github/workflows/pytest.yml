name: Unit and Functional Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-test.txt

      - name: Run unit and functional pytest suite
        run: python -m pytest -q tests/test_cli.py tests/test_cli_errors.py tests/test_gui.py tests/test_history.py tests/test_pipeline.py tests/test_settings.py tests/test_targets.py tests/test_tui.py tests/test_peq_exporters.py
