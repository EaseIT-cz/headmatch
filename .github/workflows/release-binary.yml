name: Build and release binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.6.0)'
        required: false

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: python scripts/build.py --clean

      - name: Verify binaries exist
        run: |
          ls -lh dist/headmatch-gui dist/headmatch
          file dist/headmatch-gui dist/headmatch

      - name: Rename with platform suffix
        run: |
          mv dist/headmatch-gui dist/headmatch-gui-linux-x64
          mv dist/headmatch dist/headmatch-linux-x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: headmatch-linux-x64
          path: |
            dist/headmatch-gui-linux-x64
            dist/headmatch-linux-x64

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/headmatch-gui-linux-x64
            dist/headmatch-linux-x64
          fail_on_unmatched_files: true
